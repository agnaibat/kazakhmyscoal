<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Coal Physics</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="../css/coal.css">
</head>
<body>

<section class="coal-physics">

    <div class="background"></div>

    <div class="content">

        <header class="title">
            <span class="code">MATERIAL</span>
            <h1>Физика угля</h1>
        </header>

        <div class="grid">

            <div class="metric">
                <span class="value">6000+</span>
                <span class="unit">ккал/кг</span>
                <span class="label">Теплотворная способность</span>
            </div>

            <div class="metric">
                <span class="value">≤ 12%</span>
                <span class="label">Зольность</span>
            </div>

            <div class="metric">
                <span class="value">8–28%</span>
                <span class="label">Выход летучих веществ</span>
            </div>

            <div class="metric">
                <span class="value">≤ 10%</span>
                <span class="label">Влажность</span>
            </div>

            <div class="metric wide">
                <span class="value">0–300 мм</span>
                <span class="label">Фракционный состав</span>
            </div>

            <div class="metric wide">
                <span class="value">Ж/д · Авто</span>
                <span class="label">Логистика и отгрузка</span>
            </div>

        </div>

    </div>

</section>

<script src="js/coal.js"></script>
</body>
</html>
